services:
  head:
    container_name: slurm-head
    hostname: head
    build:
      context: ./slurm-image
      dockerfile: Dockerfile
      args:
        SLURM_TAG: 25-05-2-1
    environment:
      - SLURM_HEAD_NODE=head
      - SLURM_NODE_COUNT=4
    command: ["/head-entrypoint.sh"]
    user: root
    privileged: true
    ports:
      - "6817:6817" # SLURM controller port
      - "6818:6818" # SLURM scheduler port
      - "6820:6820" # SLURM REST API (slurmrestd)
      - "3306:3306"
    volumes:
      - slurm-volume:/home/slurmuser
    networks:
      slurm-network:

  # Compute nodes
  compute-1:
    hostname: "compute-1"
    container_name: slurm-compute-1
    build:
      context: ./slurm-image
      dockerfile: Dockerfile
      args:
        SLURM_TAG: 25-05-2-1
    environment:
      - SLURM_HEAD_NODE=head
      - SLURM_NODE_COUNT=4
    command: ["/compute-entrypoint.sh"]
    user: root
    privileged: true
    depends_on:
      - head
    volumes:
      - slurm-volume:/home/slurmuser
    networks:
      slurm-network:
  compute-2:
    hostname: "compute-2"
    container_name: slurm-compute-2
    build:
      context: ./slurm-image
      dockerfile: Dockerfile
      args:
        SLURM_TAG: 25-05-2-1
    environment:
      - SLURM_HEAD_NODE=head
      - SLURM_NODE_COUNT=4
    command: ["/compute-entrypoint.sh"]
    user: root
    privileged: true
    depends_on:
      - head
    volumes:
      - slurm-volume:/home/slurmuser
    networks:
      slurm-network:
  compute-3:
    hostname: "compute-3"
    container_name: slurm-compute-3
    build:
      context: ./slurm-image
      dockerfile: Dockerfile
      args:
        SLURM_TAG: 25-05-2-1
    environment:
      - SLURM_HEAD_NODE=head
      - SLURM_NODE_COUNT=4
    command: ["/compute-entrypoint.sh"]
    user: root
    privileged: true
    depends_on:
      - head
    volumes:
      - slurm-volume:/home/slurmuser
    networks:
      slurm-network:
  compute-4:
    hostname: "compute-4"
    container_name: slurm-compute-4
    build:
      context: ./slurm-image
      dockerfile: Dockerfile
      args:
        SLURM_TAG: 25-05-2-1
    environment:
      - SLURM_HEAD_NODE=head
      - SLURM_NODE_COUNT=4
    command: ["/compute-entrypoint.sh"]
    user: root
    privileged: true
    depends_on:
      - head
    volumes:
      - slurm-volume:/home/slurmuser
    networks:
      slurm-network:

networks:
  slurm-network:
    driver: bridge

volumes:
  slurm-volume:
